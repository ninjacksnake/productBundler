<div class="container">
  <mat-card class="example-card">
    <mat-card-header>
      <mat-card-title>Iniciar Sesi&oacute;n</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="logInForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <input matInput placeholder="Correo" formControlName="email">
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <input matInput type="password" placeholder="Contrase&ntilde;a" formControlName="password">
        </mat-form-field>
        <div class="button-container">
        <button type="submit" mat-raised-button color="primary" [disabled]="logInForm.invalid">Iniciar Sesi&oacute;n</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
