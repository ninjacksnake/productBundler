
<table mat-table [dataSource]="bundles" class="mat-elevation-z8">
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nombre</th>
            <td mat-cell *matCellDef="let bundle">{{bundle.name}}</td>
        </ng-container>
        <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef>Descripción</th>
            <td mat-cell *matCellDef="let bundle">{{bundle.description}}</td>
        </ng-container>
        <ng-container matColumnDef="price1">
            <th mat-header-cell *matHeaderCellDef>Precio CF</th>
            <td mat-cell *matCellDef="let bundle">{{bundle.price1}}</td>
        </ng-container>
        <ng-container matColumnDef="price2">
            <th mat-header-cell *matHeaderCellDef>Precio PM</th>
            <td mat-cell *matCellDef="let bundle">{{bundle.price2}}</td>
        </ng-container>
        <ng-container matColumnDef="createdDate">
            <th mat-header-cell *matHeaderCellDef>Fecha de creación</th>
            <td mat-cell *matCellDef="let bundle">{{bundle.createdDate}}</td>
        </ng-container>
        <ng-container matColumnDef="updatedDate">
            <th mat-header-cell *matHeaderCellDef>Fecha de actualización</th>
            <td mat-cell *matCellDef="let bundle">{{bundle.updatedDate}}</td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns"></tr>    
    </table>
