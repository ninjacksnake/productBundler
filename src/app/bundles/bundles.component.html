<div class="row">
    <div class="col-12">
        <h1>Lista de Combos</h1>
    </div>
    <div class="col-12">
        <input type="text" class="mat-input" matInput placeholder="Buscar combo">
        <button mat-button color="primary">Agregar Combo</button>
    </div>
</div>
<table mat-table [dataSource]="bundles" class="mat-elevation-z1">
    <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let bundle">{{bundle.name}}</td>
    </ng-container>
    <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Descripción</th>
        <td mat-cell *matCellDef="let bundle">{{bundle.description}}</td>
    </ng-container>
    <ng-container matColumnDef="priceCF">
        <th mat-header-cell *matHeaderCellDef>Precio CF</th>
        <td mat-cell *matCellDef="let bundle">{{bundle.priceCF | currency}}</td>
    </ng-container>
    <ng-container matColumnDef="pricePM">
        <th mat-header-cell *matHeaderCellDef>Precio PM</th>
        <td mat-cell *matCellDef="let bundle">{{bundle.pricePM | currency}}</td>
    </ng-container>
    <ng-container matColumnDef="createdDate">
        <th mat-header-cell *matHeaderCellDef>Fecha de creación</th>
        <td mat-cell *matCellDef="let bundle">{{bundle.createdDate | date:'dd/MM/YYYY'}}</td>
    </ng-container>
    <ng-container matColumnDef="updatedDate">
        <th mat-header-cell *matHeaderCellDef>Fecha de actualización</th>
        <td mat-cell *matCellDef="let bundle">{{bundle.updatedDate | date:'dd/MM/YYYY'}}</td>
    </ng-container>
    <ng-container matColumnDef="options">
        <th mat-header-cell *matHeaderCellDef>Opciones</th>
        <td mat-cell *matCellDef="let bundle">
            <div class="option-buttons-container">
                <button matTooltip="Visualizar {{bundle.name}}" class="option-button">
                    <mat-icon>visibility</mat-icon>
                </button>
                <!-- <button mat-mini-fab color="primary" matTooltip="Modificar {{bundle.name}}" >
                    <mat-icon>edit</mat-icon>
                </button> -->
                <button matTooltip="Eliminar {{bundle.name}}" class="option-button">
                    <mat-icon>remove_shopping_cart</mat-icon>
                </button>
            </div>  
        </td>   
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
</table>
