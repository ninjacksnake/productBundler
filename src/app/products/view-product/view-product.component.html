<div class="product-view-container">
    <div class="product-view-header">
        <h1 class="product-view-name" *ngIf="product">{{ product.name}}</h1>
    </div>
    
    <div class="product-view-body">
        <div class="product-view-image-container">
            <img *ngIf="product" src="{{imgSrc}}" class="product-view-image" alt="{{product.image}}" />
        </div>
        
        <div class="product-view-details">
            <div class="product-view-description">
                <h2 class="description-title">Descripción</h2>
                <p class="description-text" *ngIf="product">
                   {{product.description}}
                </p>
            </div>
            
            <div class="price-container">
                <div class="price-card">
                    <span class="price-label">Precio CF</span>
                    <span class="price-value" *ngIf="product">{{product.priceCF|currency}}</span>
                    <span class="price-note">Precio al contado</span>
                </div>
                
                <div class="price-card highlight">
                    <span class="price-label">Precio PM</span>
                    <span class="price-value" *ngIf="product">{{product.pricePM|currency}}</span>
                    <span class="price-note">Precio a plazos</span>
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="btn btn-secondary" (click)="editProduct()">Editar</button>
                <button class="btn btn-primary">Añadir al carrito</button>
            </div>
        </div>
    </div>
</div>
