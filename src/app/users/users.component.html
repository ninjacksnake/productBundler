<h1>lista de Usuarios</h1>

<table mat-table [dataSource]="users" class="mat-elevation-z1">

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Nombre</th>
    <td mat-cell *matCellDef="let user">{{user.name}}</td>
  </ng-container>

  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef>Correo</th>
    <td mat-cell *matCellDef="let user">{{user.email}}</td>
  </ng-container>

  <ng-container matColumnDef="role">
    <th mat-header-cell *matHeaderCellDef>Rol</th>
    <td mat-cell *matCellDef="let user">{{user.role}}</td>
  </ng-container>
  
  <ng-container matColumnDef="options">
    <th mat-header-cell *matHeaderCellDef>Opciones</th>
    <td mat-cell *matCellDef="let user">
      <div class="option-buttons-container">
        <button matTooltip="Visualizar {{user.name}}" class="option-button">
          <mat-icon>visibility</mat-icon>
        </button>
        <!-- <button mat-mini-fab color="primary" matTooltip="Modificar {{user.name}}" >
          <mat-icon>edit</mat-icon>
        </button> -->
        <button matTooltip="Eliminar {{user.name}}" class="option-button">
          <mat-icon>remove_shopping_cart</mat-icon>
        </button>
      </div>  
    </td>   
  </ng-container>
  

  

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
